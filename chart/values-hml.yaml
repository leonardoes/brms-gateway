#environment: hml

## Application required reserved IG?
### Add node label
reservedInstanceGroup: "brms-drools"
#iam.amazonaws.com/role: "arn:aws:iam::301676479058:role/SQS-AccessEKS"
## Taint NoddeGroup
tolerations:
 - effect: "NoSchedule"
   key: "unimed/reserved-for" 
   operator: "Equal"
   value: "brms-drools"

## Container image confs
image:
   repository: "301676479058.dkr.ecr.us-east-1.amazonaws.com/brms-gateway-globalvida-cotacao"
  #  tag: latest

albHealthCheckPath: /actuator/health

## Application confs
### Port
appPort: 8080

### Container size (request/limits)
resources:
   requests:
     memory: 658Mi
     cpu: 500m
   limits:
     memory: 658Mi
     cpu: 500m

### min number pods
minReplicas: 2

