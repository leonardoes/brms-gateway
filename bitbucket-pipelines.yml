image:
  name: 352943475640.dkr.ecr.sa-east-1.amazonaws.com/uni-pipe-deploy-eks-java:jdk17-1.0.0
  aws:
    oidc-role: arn:aws:iam::352943475640:role/BitBucktetECRpull

definitions:
  steps:
    - step: &build-default
        name: Build Maven
        oidc: true
        caches:
          - maven
        script:
          - mvn clean install ${MAVEN_ARGS}
        artifacts:
          - target/*.jar
    - step: &sonar-scan
        name: "Sonar Scan"
        oidc: true
        script:
          - echo "Your security scan goes here..."
    # Steps build
    - step: &build-develop
        <<: *build-default
        runs-on:
          - unimed.build.java.dev
          - self.hosted
          - linux
    - step: &build-staging
        <<: *build-default
        runs-on:
          - unimed.build.java.hml
          - self.hosted
          - linux
    - step: &build-production
        <<: *build-default
        runs-on:
          - unimed.build.java.prd
          - self.hosted
          - linux
    # Step deploy common
    - step: &deploy-default
        services:
          - docker
        oidc: true
        script:
          - bash /pipe.sh
    # Steps deploy
    - step: &deploy-develop
        <<: *deploy-default
        name: Deploy to Develop
        deployment: develop
        runs-on:
          - unimed.eks.dev
          - self.hosted
          - linux
    - step: &deploy-staging
        <<: *deploy-default
        name: Deploy to Staging
        deployment: staging
        runs-on:
          - unimed.eks.hml
          - self.hosted
          - linux
    - step: &deploy-production
        <<: *deploy-default
        name: Deploy to Production
        deployment: production
        trigger: manual
        runs-on:
          - unimed.eks.prd
          - self.hosted
          - linux
pipelines:
  branches:
    master:
      - parallel:
          - step: *build-production
          - step: *sonar-scan
      - step: *deploy-production
    staging:
      - parallel:
          - step: *build-staging
          - step: *sonar-scan
      - step: *deploy-staging
    develop:
      - parallel:
          - step: *build-develop
          - step: *sonar-scan
      - step: *deploy-develop
